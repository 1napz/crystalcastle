# .coderabbit.yaml
language: "th"
early_access: false
reviews:
  profile: "chill"                      # เปลี่ยนเป็น chill เพื่อเริ่มต้นแบบนุ่มนวล
  request_changes_workflow: true
  high_level_summary: true
  poem: false
  review_status: true
  review_details: true
  auto_review:
    enabled: true
    drafts: false                       # ปิดการรีวิว Draft PR
  path_filters:
    - "!docs/"
    - "!public/"
    - "!dist/"
    - "!.next/"
    - "!*.lock"
    - "!**/__tests__/**"
    - "!**/*.test.js"
  path_instructions:
    - path: "api/**/*.js"
      instructions: |
        - ตรวจสอบ try-catch และ error handling
        - ตรวจสอบ input validation และ authentication
        - ใช้ HTTP status codes ที่เหมาะสม
        - ตรวจสอบ Environment Variables สำหรับ service role keys
    - path: "product.js"
      instructions: |
        - ตรวจสอบการเรียก API ด้วย AbortController
        - ห้ามใส่ secrets ใน client-side
        - แสดง loading/error/success state ให้ถูกต้อง
    - path: "CHANGELOG.md"
      instructions: |
        - ปฏิบัติตาม Keep a Changelog
        - ตรวจสอบ MD022 (blank lines after headings)
        - ตรวจสอบ MD047 (single trailing newline)
        - [Unreleased] ต้องมี reference link (compare v1.6.0...HEAD)
    - path: "**/*.test.js"
      instructions: |
        - ตรวจสอบ coverage และ edge cases
        - ใช้ describe/it ให้เหมาะสม
chat:
  auto_reply: true
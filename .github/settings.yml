repository:
  name: crystalcastle
  description: AI-driven workflow automation and repo governance
  homepage: https://github.com/1napz/crystalcastle
  private: false
  has_issues: true
  has_wiki: false
  has_projects: false

branches:
  - name: main
    protection:
      required_status_checks:
        strict: true
        contexts:
          - ci-cd-pipeline
          - lint
          - unit-tests
      required_pull_request_reviews:
        dismiss_stale_reviews: true
        required_approving_review_count: 1
      restrictions:
        users: []
        teams: [reviewers]
      enforce_admins: true

# Optional: default labels
labels:
  - name: bug
    color: d73a4a
    description: Something isn't working
  - name: enhancement
    color: a2eeef
    description: New feature or request
  - name: documentation
    color: 0075ca
    description: Improvements or additions to documentation

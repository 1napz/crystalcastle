<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaulted - AI Generation Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0a; color: #e5e5e5; }
       .card { background-color: #171717; border: 1px solid #262626; }
       .tab-active { border-bottom: 2px solid #3b82f6; color: #fff; }
       .tab-inactive { color: #9ca3af; }
       .progress-bar { transition: width 0.3s ease; }
    </style>
</head>
<body class="font-sans">
    <div class="container mx-auto px-4 py-8 max-w-5xl">
        <header class="mb-6">
            <h1 class="text-3xl font-bold text-white">Vaulted</h1>
            <p class="text-gray-400">AI Generation Vault</p>
        </header>

        <div class="flex gap-6 border-b border-gray-800 mb-6">
            <button onclick="switchTab('image')" id="tab-image" class="pb-3 tab-inactive">Image Generation</button>
            <button onclick="switchTab('video')" id="tab-video" class="pb-3 tab-active">Image to Video</button>
        </div>

        <div id="content-image" class="hidden">
            <main id="grid-image" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></main>
        </div>

        <div id="content-video" class="">
            <div class="card rounded-lg p-6 mb-6">
                <h2 class="text-xl font-bold text-white mb-4">สร้างวิดีโอจากรูปด้วย Meta AI</h2>

                <label class="block mb-2 text-sm font-medium text-gray-300">1. อัปโหลดรูปสินค้า 1-5 รูป</label>
                <input type="file" id="imageUpload" accept="image/*" multiple class="block w-full text-sm text-gray-400 mb-2 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:bg-blue-600 file:text-white hover:file:bg-blue-700">
                <p id="fileCount" class="text-xs text-gray-500 mb-4">ยังไม่ได้เลือกรูป</p>

                <div id="preview" class="grid grid-cols-5 gap-2 mb-4"></div>

                <button onclick="generateVideo()" id="genBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded disabled:bg-gray-600 disabled:cursor-not-allowed">
                    สร้าง Prompt + โพสต์ TikTok
                </button>

                <div id="progressWrapper" class="hidden mt-4">
                    <div class="flex justify-between mb-1">
                        <span class="text-sm text-gray-400">กำลังสร้าง...</span>
                        <span id="progressText" class="text-sm text-gray-400">0%</span>
                    </div>
                    <div class="w-full bg-gray-700 rounded-full h-2.5">
                        <div id="progressBar" class="progress-bar bg-blue-600 h-2.5 rounded-full" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <div id="result" class="hidden">
                <div class="grid md:grid-cols-2 gap-6">
                    <div class="card rounded-lg p-6">
                        <h3 class="text-lg font-bold text-white mb-3">Prompt สำหรับ Meta AI</h3>
                        <div class="bg-black rounded p-3 text-sm text-green-400 mb-3 font-mono whitespace-pre-wrap" id="promptOutput"></div>
                        <button onclick="copyPrompt()" class="text-xs bg-gray-700 hover:bg-gray-600 text-white px-3 py-1 rounded">Copy Prompt</button>
                    </div>
                    <div class="card rounded-lg p-6">
                        <h3 class="text-lg font-bold text-white mb-3">แคปชั่น TikTok + 5 Hashtags</h3>
                        <div class="bg-black rounded p-3 text-sm text-white mb-3 whitespace-pre-wrap" id="tiktokOutput"></div>
                        <button onclick="copyTiktok()" class="text-xs bg-gray-700 hover:bg-gray-600 text-white px-3 py-1 rounded">Copy Caption</button>
                    </div>
                </div>
                <div class="card rounded-lg p-6 mt-6">
                    <h3 class="text-lg font-bold text-white mb-4">Label ประสิทธิภาพ - Mock Data</h3>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-center">
                        <div class="bg-black rounded p-3"><div class="text-2xl font-bold text-blue-400" id="labelViews">0</div><div class="text-xs text-gray-500">ยอดวิว</div></div>
                        <div class="bg-black rounded p-3"><div class="text-2xl font-bold text-green-400" id="labelSales">$0</div><div class="text-xs text-gray-500">ยอดขาย</div></div>
                        <div class="bg-black rounded p-3"><div class="text-2xl font-bold text-yellow-400" id="labelCTR">0%</div><div class="text-xs text-gray-500">CTR</div></div>
                        <div class="bg-black rounded p-3"><div class="text

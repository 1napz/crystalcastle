<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>จัดการสินค้า - Crystal Castle</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    :focus-visible {
      outline: 3px solid #8b5cf6;
      outline-offset: 2px;
      border-radius: 0.5rem;
    }
    [aria-invalid="true"] {
      border-color: #dc2626 !important;
      background-color: #fef2f2 !important;
    }
    .error-message {
      color: #dc2626;
      font-size: 0.75rem;
      margin-top: 0.25rem;
      display: block;
    }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      border: 0;
    }
    #statusText {
      min-height: 1.5em;
    }
  </style>
</head>
<body class="bg-slate-50 p-4 pb-20">

  <main class="max-w-2xl mx-auto space-y-5">
    
    <!-- ส่วนที่ 1: รูปภาพสินค้า -->
    <section class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
      <div class="flex items-center gap-2.5 mb-4">
        <span class="w-7 h-7 rounded-full bg-violet-100 text-violet-700 flex items-center justify-center text-sm font-semibold">1</span>
        <h2 class="font-semibold text-slate-900">รูปสินค้า</h2>
      </div>
      <div id="previewGrid" class="grid grid-cols-3 gap-2"></div>
      <p class="text-[11px] text-slate-500 mt-2.5">รองรับ JPG, PNG (สูงสุด 10 รูป)</p>
    </section>

    <!-- ส่วนที่ 2: รายละเอียดสินค้า -->
    <section class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
      <div class="flex items-center gap-2.5 mb-4">
        <span class="w-7 h-7 rounded-full bg-violet-100 text-violet-700 flex items-center justify-center text-sm font-semibold">2</span>
        <h2 class="font-semibold text-slate-900">รายละเอียดสินค้า</h2>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label for="dateInput" class="text-xs text-slate-500 mb-1 block">วันที่</label>
          <input id="dateInput" readonly class="w-full h-11 px-3 rounded-xl bg-slate-50 border border-slate-200 text-sm">
        </div>
        <div>
          <label for="categorySelect" class="text-xs text-slate-500 mb-1 block">หมวดหมู่</label>
          <select id="categorySelect" class="w-full h-11 px-3 rounded-xl border border-slate-200 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-violet-500">
            <option value="Menswear">Menswear</option>
            <option value="Womenswear">Womenswear</option>
            <option value="Accessories">Accessories</option>
            <option value="Shoes">Shoes</option>
            <option value="Bags">Bags</option>
          </select>
        </div>
        <div class="col-span-2">
          <label for="brandInput" class="text-xs text-slate-500 mb-1 block">แบรนด์ / รุ่น</label>
          <input id="brandInput" placeholder="เช่น Uniqlo, Nike, Adidas" class="w-full h-11 px-3 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-violet-500">
        </div>
        <div class="col-span-2">
          <label for="filenameInput" class="text-xs text-slate-500 mb-1 block">ชื่อไฟล์</label>
          <input id="filenameInput" readonly class="w-full h-11 px-3 rounded-xl bg-slate-50 border border-slate-200 text-sm text-slate-600 font-mono">
        </div>
      </div>
    </section>

    <!-- ส่วนที่ 3: คำสั่งวิดีโอ -->
    <section class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
      <div class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-2.5">
          <span class="w-7 h-7 rounded-full bg-violet-100 text-violet-700 flex items-center justify-center text-sm font-semibold">3</span>
          <h2 class="font-semibold text-slate-900">คำสั่งสร้างวิดีโอ</h2>
        </div>
        <button id="genPromptBtn" type="button" class="text-xs font-medium text-violet-600 bg-violet-50 px-3 py-1.5 rounded-full hover:bg-violet-100 transition">
          ✨ AI ช่วยคิด
        </button>
      </div>
      <textarea id="promptInput" rows="3" placeholder="อธิบายลักษณะวิดีโอที่ต้องการ..." class="w-full p-3.5 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-violet-500 resize-none"></textarea>
      <div id="promptStatus" class="text-xs text-slate-400 mt-1 flex justify-between items-center">
        <span></span>
        <div class="flex gap-2">
          <button id="copyPromptBtn" type="button" class="hidden text-violet-500 hover:text-violet-700">📋 คัดลอก</button>
          <button id="undoPromptBtn" type="button" class="hidden text-amber-500 hover:text-amber-700">↩️ กลับต้นฉบับ</button>
        </div>
      </div>
    </section>

    <!-- ส่วนที่ 4: แคปชั่นโพสต์ -->
    <section class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
      <div class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-2.5">
          <span class="w-7 h-7 rounded-full bg-violet-100 text-violet-700 flex items-center justify-center text-sm font-semibold">4</span>
          <h2 class="font-semibold text-slate-900">แคปชั่นโพสต์</h2>
        </div>
        <button id="genPostBtn" type="button" class="text-xs font-medium text-violet-600 bg-violet-50 px-3 py-1.5 rounded-full hover:bg-violet-100 transition">
          ✍️ สร้างแคปชั่น
        </button>
      </div>
      <textarea id="postOutput" rows="3" readonly placeholder="กดปุ่มเพื่อสร้างแคปชั่นอัตโนมัติตามรายละเอียดสินค้า" class="w-full p-3.5 rounded-xl border border-slate-200 text-sm bg-slate-50 resize-none"></textarea>
      <div class="flex justify-end mt-1">
        <button id="copyPostBtn" type="button" class="hidden text-xs text-violet-500 hover:text-violet-700">📋 คัดลอกแคปชั่น</button>
      </div>
    </section>

    <!-- ส่วนที่ 5: เลือก Video Engine -->
    <section class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
      <div class="flex items-center gap-2.5 mb-4">
        <span class="w-7 h-7 rounded-full bg-violet-100 text-violet-700 flex items-center justify-center text-sm font-semibold">5</span>
        <h2 class="font-semibold text-slate-900">เลือกเครื่องมือสร้างวิดีโอ</h2>
      </div>
      <div class="space-y-3">
        <label for="videoEngineSelect" class="text-xs text-slate-500 block">Video Engine</label>
        <select id="videoEngineSelect" class="w-full h-11 px-3 rounded-xl border border-slate-200 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-violet-500">
          <option value="">-- เลือกเครื่องมือ --</option>
          <option value="openai">OpenAI Sora</option>
          <option value="runway">Runway Gen-2</option>
          <option value="pika">Pika Labs</option>
          <option value="fal">FAL Kling</option>
          <option value="magic">Magic Hour</option>
        </select>
        <div id="engineInfo" class="text-xs text-slate-500 mt-1 italic" aria-live="polite" aria-atomic="true"></div>
      </div>
    </section>

    <!-- TikTok URL (ตามที่ CodeRabbit ชี้) -->
    <section class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
      <label for="tiktokInput" class="text-xs text-slate-500 mb-1 block">TikTok URL (optional)</label>
      <input type="url" id="tiktokInput" placeholder="https://www.tiktok.com/@yourusername" 
             class="w-full h-11 px-3 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-violet-500">
    </section>

    <!-- สถานะ (ARIA Live Region) -->
    <div id="statusText" 
         class="text-center text-sm py-3 hidden rounded-xl"
         role="status" 
         aria-live="polite" 
         aria-atomic="true">
    </div>

    <!-- ปุ่มหลัก -->
    <div class="sticky bottom-4 flex gap-3 bg-white/95 backdrop-blur-sm p-4 rounded-2xl shadow-lg border border-slate-200">
      <button id="generateBtn" type="button" 
              class="flex-1 bg-violet-600 text-white font-medium py-3.5 rounded-xl hover:bg-violet-700 transition disabled:opacity-50">
        🎥 สร้างวิดีโอเลย
      </button>
      <button id="submitBtn" type="button" 
              class="flex-1 bg-emerald-600 text-white font-medium py-3.5 rounded-xl hover:bg-emerald-700 transition">
        💾 บันทึกสินค้า
      </button>
      <button id="logoutBtn" type="button" 
              class="px-6 py-3.5 rounded-xl border border-slate-200 text-slate-600 hover:bg-slate-50 transition">
        🚪 ออก
      </button>
    </div>

  </main>

  <script src="product.js"></script>

  <script>
    // Inline script สำหรับ dropdown + status (เสริม product.js)
    document.addEventListener('DOMContentLoaded', () => {
      const engineSelect = document.getElementById('videoEngineSelect');
      const engineInfo = document.getElementById('engineInfo');
      const statusText = document.getElementById('statusText');

      const descriptions = {
        'openai': '✨ OpenAI Sora: วิดีโอสมจริง ความยาวสูงสุด 60 วินาที',
        'runway': '🎬 Runway Gen-2: ควบคุมการเคลื่อนไหวละเอียด เหมาะกับแฟชั่น',
        'pika': '🎨 Pika Labs: อนิเมชันสวย เน้นอารมณ์',
        'fal': 'FAL Kling: คุณภาพสูง ราคาแพง (จ่าย)',
        'magic': 'Magic Hour: ฟรี 400 เครดิต/วัน เอฟเฟกต์ดี',
        '': 'กรุณาเลือก Video Engine'
      };

      if (engineSelect && engineInfo) {
        engineSelect.addEventListener('change', function(event) {
          const value = event.target.value;
          engineInfo.textContent = descriptions[value] || '';
        });
        engineSelect.dispatchEvent(new Event('change'));
      }

      // ฟังก์ชันแสดงสถานะ (ใช้ร่วมกับ product.js)
      window.showStatus = function(message, type = 'info') {
        if (!statusText) return;
        statusText.classList.remove('hidden', 'text-red-600', 'text-green-600');
        if (type === 'error') statusText.classList.add('text-red-600');
        else if (type === 'success') statusText.classList.add('text-green-600');
        statusText.textContent = message;
        statusText.classList.remove('hidden');
      };
    });
  </script>
</body>
</html>
